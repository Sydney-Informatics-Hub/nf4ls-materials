name: Populate repository from template

on:
  push:
  workflow_dispatch:

jobs:
  setup-repo:
    # Only run when this repo has been created from the template (not in the template itself)
    if: github.repository != 'Sydney-Informatics-Hub/nf4ls-materials'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Install cookiecutter
        run: pip3 install cookiecutter

      - name: Fetch repo details
        id: repo_details
        run: |
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }})

          REPO_NAME=$(echo $RESPONSE | jq -r '.name')
          DESCRIPTION=$(echo $RESPONSE | jq -r '.description // "Training workshop materials"')
          GITHUB_LOGIN=$(echo $RESPONSE | jq -r '.owner.login')
          AUTHOR_NAME=$(echo $RESPONSE | jq -r '.owner.name // .owner.login')

          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "description=$DESCRIPTION" >> $GITHUB_OUTPUT
          echo "github_username=$GITHUB_LOGIN" >> $GITHUB_OUTPUT
          echo "author_name=$AUTHOR_NAME" >> $GITHUB_OUTPUT

      - name: Build out template
        run: |
          pushd /tmp
          cookiecutter "$GITHUB_WORKSPACE" --no-input \
            repo_name="${{ steps.repo_details.outputs.repo_name }}" \
            site_name="${{ steps.repo_details.outputs.repo_name }}" \
            description="${{ steps.repo_details.outputs.description }}" \
            github_username="${{ steps.repo_details.outputs.github_username }}" \
            author_name="${{ steps.repo_details.outputs.author_name }}"
          popd

          # Remove template scaffolding
          rm -rf .github/
          rm -rf '{{cookiecutter.repo_name}}'
          rm -f cookiecutter.json

          # Move generated content to repo root
          shopt -s dotglob
          rsync -a /tmp/${{ steps.repo_details.outputs.repo_name }}/ .

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .
          git commit -m "Initialize from nf4ls-materials template"
          git push --force origin main
