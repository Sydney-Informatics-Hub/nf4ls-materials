site_name: "Nextflow for the life sciences workshop materials"
repo_url: "https://github.com/{{cookiecutter.github_username}}/{{cookiecutter.repo_name}}"
repo_name: "Nextflow for the life sciences workshop materials"

nav:
  # INSTRUCTOR_START
  - Instructor hub: index.md
  - Instructor guides:
      - Training logistics: instructor/logistics.md
      - Training infrastructure: instructor/environment.md
      - Training materials: instructor/materials.md
  # INSTRUCTOR_END
  - Home: workshop/index.md
  - Setup: workshop/setup.md
  - Part 1 - Nextflow Foundations:
      - 1.0 Why Nextflow?: workshop/part1/00_whynextflow.md
      - 1.1 Introduction: workshop/part1/01_intro.md
      - 1.2 Hello World!: workshop/part1/02_helloworld.md
      - 1.3 Writing your first pipeline: workshop/part1/03_hellonf.md
      - 1.4 Running pipelines: workshop/part1/04_execution.md
      - 1.5 Inputs and channels: workshop/part1/05_inputs.md
      - 1.6 Parameters: workshop/part1/06_params.md
      - 1.7 Adding processes: workshop/part1/07_process.md
      - 1.8 Dynamic naming: workshop/part1/08_dynamic.md
      - 1.9 Wrapping up: workshop/part1/09_outro.md
  - Part 2 - Hands-on workflow development:
      - 2.0 Introduction: workshop/part2/00_intro.md
      - 2.1 Our first process and container: workshop/part2/01_salmon_idx.md
      - 2.2 Samplesheets, operators, and groovy: workshop/part2/02_fastqc.md
      - 2.3 Multiple process inputs: workshop/part2/03_quant.md
      - 2.4 Combining channels, multiple process outputs: workshop/part2/04_multiqc.md
      - 2.5 Upscaling to multiple samples and introspection: workshop/part2/05_scale.md
theme:
  name: material
  logo: assets/usyd-logo.png
  features:
    - navigation.footer
    - content.code.copy
  palette:
    - scheme: default
      primary: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      preserve_tabs: true
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  analytics:
    provider: google
    property: G-TNWWV3HK57